<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Super Deals Mauritius Co Ltd</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1f2937);
    color: #e5e7eb;
    text-align: center;
  }

  header {
    padding: 25px;
    background: rgba(0,0,0,0.4);
  }

  .container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
  }

  .card {
    background: rgba(255,255,255,0.06);
    padding: 20px;
    border-radius: 14px;
    margin-bottom: 20px;
  }

  input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 8px;
    border: none;
    outline: none;
  }

  button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
  }

  .login-btn { background: #3b82f6; }
  .submit-btn { background: #22c55e; }
  .spin-btn { background: #fbbf24; }

  canvas {
    margin-top: 15px;
    background: white;
    border-radius: 50%;
  }

  .reward {
    margin-top: 15px;
    font-size: 1.3rem;
    color: #facc15;
    font-weight: bold;
  }

  #mainApp { display: none; }
</style>
</head>

<body>

<header>
  <h1>Super Deals Mauritius Co Ltd</h1>
  <p>Feedback • Spin & Win • WhatsApp Claim</p>
</header>

<div class="container">

  <!-- LOGIN -->
  <div class="card" id="loginBox">
    <h2>Login</h2>

    <input id="userId" placeholder="Enter ID" />
    <input id="userPass" type="password" placeholder="Enter Password" />

    <button class="login-btn" onclick="login()">
      Login
    </button>
  </div>

  <!-- MAIN -->
  <div id="mainApp">

    <!-- FEEDBACK -->
    <div class="card">
      <h2>Customer Feedback</h2>

      <select>
        <option>Excellent</option>
        <option>Good</option>
        <option>Average</option>
        <option>Poor</option>
      </select>

      <textarea placeholder="What did you like?"></textarea>

      <button class="submit-btn" onclick="unlockSpin()">
        Submit Feedback
      </button>
    </div>

    <!-- SPIN -->
    <div class="card">
      <h2>🎡 Spin to Win</h2>

      <canvas id="wheel" width="300" height="300"></canvas>

      <button class="spin-btn" onclick="spinWheel()">
        SPIN NOW
      </button>

      <div class="reward" id="reward"></div>
    </div>

  </div>
</div>

<script>
const PASSWORD = "wassim777";
const ID = "hospitality";

let canSpin = false;
let spinning = false;
let angle = 0;

const rewards = [
  "5% OFF on next booking",
  "10% OFF on next booking",
  "Extra 3 hours on next booking",
  "Extra 4 hours on next booking"
];

function login() {
  const id = document.getElementById("userId").value;
  const pass = document.getElementById("userPass").value;

  if (id === ID && pass === PASSWORD) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("mainApp").style.display = "block";
    drawWheel();
    alert("Login successful 🎉");
  } else {
    alert("Invalid login");
  }
}

function unlockSpin() {
  if (localStorage.getItem("spunOnce")) {
    alert("You already used your 1 spin 🎁");
    return;
  }

  canSpin = true;
  alert("Spin unlocked 🎉");
}

function drawWheel() {
  const canvas = document.getElementById("wheel");
  const ctx = canvas.getContext("2d");
  const arc = (2 * Math.PI) / rewards.length;

  for (let i = 0; i < rewards.length; i++) {
    const start = angle + i * arc;

    ctx.beginPath();
    ctx.fillStyle = i % 2 ? "#f59e0b" : "#fbbf24";
    ctx.moveTo(150,150);
    ctx.arc(150,150,150,start,start+arc);
    ctx.fill();

    ctx.save();
    ctx.translate(150,150);
    ctx.rotate(start + arc/2);
    ctx.fillStyle = "#000";
    ctx.font = "12px Arial";
    ctx.fillText(rewards[i], 120, 5);
    ctx.restore();
  }
}

function spinWheel() {
  if (!canSpin) {
    alert("Submit feedback first!");
    return;
  }

  if (localStorage.getItem("spunOnce")) {
    alert("Only 1 spin allowed ❌");
    return;
  }

  if (spinning) return;

  spinning = true;

  let duration = Math.random() * 3000 + 4000;
  let start = null;

  function animate(t) {
    if (!start) start = t;
    let p = t - start;

    let ease = 1 - Math.pow(1 - p/duration, 3);

    angle += 0.25 + ease;

    const canvas = document.getElementById("wheel");
    const ctx = canvas.getContext("2d");

    ctx.clearRect(0,0,300,300);
    drawWheel();

    if (p < duration) {
      requestAnimationFrame(animate);
    } else {
      spinning = false;

      const result = rewards[Math.floor(Math.random()*rewards.length)];

      document.getElementById("reward").innerText =
        "🎉 You won: " + result;

      localStorage.setItem("spunOnce", "true");
      canSpin = false;

      // WhatsApp redirect
      const message = encodeURIComponent(
        "Hello Super Deals Mauritius Co Ltd, I won: " + result + ". Please help me claim my reward."
      );

      setTimeout(() => {
        window.location.href =
          "https://wa.me/23059237053?text=" + message;
      }, 1500);
    }
  }

  requestAnimationFrame(animate);
}
</script>

</body>
</html>
