<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fitness Tracker | Salman Khan Nutrition</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #f4f4f4;
      --text: #111;
      --primary: #28a745;
    }
    body.dark {
      --bg: #121212;
      --text: #f4f4f4;
      --primary: #00c896;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: 0.3s ease;
    }
    header {
      background: var(--text);
      color: var(--bg);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header img {
      height: 50px;
      user-select: none;
    }
    .container {
      max-width: 900px;
      margin: auto;
      padding: 2rem;
    }
    section {
      background: var(--bg);
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    h2 {
      margin-top: 0;
      color: var(--primary);
    }
    input, select, button {
      width: 100%;
      padding: 0.75rem;
      margin-top: 0.5rem;
      margin-bottom: 1rem;
      border: 1px solid #aaa;
      border-radius: 5px;
      font-size: 1rem;
      color: var(--text);
      background: white;
      box-sizing: border-box;
    }
    button {
      background: var(--primary);
      color: white;
      border: none;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    button:hover {
      background: #1e7e34;
    }
    .progress-bar {
      height: 20px;
      background: var(--primary);
      width: 0%;
      transition: 0.4s ease;
      margin-bottom: 1rem;
      border-radius: 10px;
    }
    .toggle {
      cursor: pointer;
      padding: 0.4rem 0.8rem;
      background: var(--primary);
      color: white;
      border-radius: 5px;
      user-select: none;
      font-size: 0.9rem;
    }
    canvas {
      width: 100% !important;
      height: 300px !important;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }
    th, td {
      padding: 0.5rem;
      border: 1px solid #ddd;
      text-align: left;
    }
    th {
      background: var(--primary);
      color: white;
    }
  </style>
</head>
<body>

  <header>
    <div><img src="log.jpg" alt="Salman Khan Nutrition Logo" /></div>
    <div>
      Salman Khan Nutrition
      <span class="toggle" onclick="toggleDark()">Toggle Dark Mode</span>
    </div>
  </header>

  <div class="container">

    <section>
      <h2>👤 Personal Info</h2>
      <input type="text" id="name" placeholder="Full Name" autocomplete="off" />
      <input type="number" id="weight" placeholder="Weight (kg)" autocomplete="off" />
      <input type="number" id="height" placeholder="Height (cm)" autocomplete="off" />
      <button onclick="calcBMI()">Calculate BMI</button>
      <p id="bmiResult" style="font-weight:bold;"></p>
    </section>

    <section>
      <h2>🍽️ Food Intake (Calorie Calculator)</h2>
      <select id="foodSelect">
        <option value="0">-- Select Food --</option>

        <optgroup label="Fruits">
          <option value="52">Apple (100g) - 52 kcal</option>
          <option value="89">Banana (100g) - 89 kcal</option>
          <option value="60">Orange (100g) - 60 kcal</option>
          <option value="57">Grapes (100g) - 57 kcal</option>
          <option value="47">Watermelon (100g) - 47 kcal</option>
          <option value="50">Pineapple (100g) - 50 kcal</option>
        </optgroup>

        <optgroup label="Vegetables">
          <option value="25">Carrot (100g) - 25 kcal</option>
          <option value="23">Cucumber (100g) - 23 kcal</option>
          <option value="30">Broccoli (100g) - 30 kcal</option>
          <option value="20">Spinach (100g) - 20 kcal</option>
          <option value="16">Tomato (100g) - 16 kcal</option>
        </optgroup>

        <optgroup label="Grains & Legumes">
          <option value="200">White Rice (1 cup cooked) - 200 kcal</option>
          <option value="215">Brown Rice (1 cup cooked) - 215 kcal</option>
          <option value="130">Oats (100g) - 130 kcal</option>
          <option value="110">Lentils (100g cooked) - 110 kcal</option>
          <option value="120">Chickpeas (100g cooked) - 120 kcal</option>
          <option value="80">Bread (1 slice) - 80 kcal</option>
        </optgroup>

        <optgroup label="Protein">
          <option value="165">Grilled Chicken Breast (100g) - 165 kcal</option>
          <option value="78">Boiled Egg (1 medium) - 78 kcal</option>
          <option value="143">Salmon (100g) - 143 kcal</option>
          <option value="120">Tofu (100g) - 120 kcal</option>
          <option value="250">Beef (100g) - 250 kcal</option>
          <option value="110">Yogurt (100g) - 110 kcal</option>
        </optgroup>

        <optgroup label="Dairy">
          <option value="42">Milk (100ml) - 42 kcal</option>
          <option value="72">Butter (10g) - 72 kcal</option>
          <option value="60">Cheese (28g slice) - 60 kcal</option>
        </optgroup>

        <optgroup label="Snacks & Fast Food">
          <option value="350">Burger (1 medium) - 350 kcal</option>
          <option value="400">Pizza Slice (1 slice) - 400 kcal</option>
          <option value="150">Fries (100g) - 150 kcal</option>
          <option value="250">Chocolate Bar (50g) - 250 kcal</option>
          <option value="190">Ice Cream (100g) - 190 kcal</option>
          <option value="120">Popcorn (30g) - 120 kcal</option>
        </optgroup>

        <optgroup label="Beverages">
          <option value="40">Orange Juice (100ml) - 40 kcal</option>
          <option value="42">Soda (100ml) - 42 kcal</option>
          <option value="2">Black Coffee (100ml) - 2 kcal</option>
          <option value="30">Tea with Milk & Sugar (100ml) - 30 kcal</option>
          <option value="120">Beer (330ml) - 120 kcal</option>
          <option value="150">Coke (330ml) - 150 kcal</option>
          <option value="150">Sprite (330ml) - 150 kcal</option>
        </optgroup>
      </select>
      <input type="number" id="quantity" placeholder="Quantity (servings or number)" autocomplete="off" />
      <button onclick="addCalories()">Add Food Item</button>

      <h3>Today's Food Items</h3>
      <table id="foodTable">
        <thead>
          <tr><th>Food</th><th>Quantity</th><th>Calories</th><th>Remove</th></tr>
        </thead>
        <tbody></tbody>
      </table>
      <p><strong>Total Calories Consumed: <span id="totalCalories">0</span> kcal</strong></p>

      <label for="customCalories">Add calories not listed (e.g., homemade food):</label>
      <input type="number" id="customCalories" placeholder="Enter calories" autocomplete="off" />
      <button onclick="addCustomCalories()">Add Custom Calories</button>
    </section>

    <section>
      <h2>💧 Water Intake Tracker</h2>
      <input type="number" id="waterIntake" placeholder="Water Intake (ml)" autocomplete="off" />
      <button onclick="addWater()">Add Water Intake</button>
      <p>Total water consumed today: <span id="totalWater">0</span> ml</p>
      <progress id="waterProgress" value="0" max="2000" style="width:100%; height: 20px;"></progress>
    </section>

  </div>

  <script>
    // Dark mode toggle
    function toggleDark() {
      document.body.classList.toggle('dark');
    }

    // BMI calculator
    function calcBMI() {
      const w = parseFloat(document.getElementById('weight').value);
      const h = parseFloat(document.getElementById('height').value) / 100;
      const result = document.getElementById('bmiResult');
      if (w > 0 && h > 0) {
        const bmi = w / (h * h);
        let category = '';
        if (bmi < 18.5) category = 'Underweight';
        else if (bmi < 25) category = 'Normal weight';
        else if (bmi < 30) category = 'Overweight';
        else category = 'Obesity';
        result.textContent = `Your BMI is ${bmi.toFixed(2)} (${category})`;
      } else {
        result.textContent = 'Please enter valid weight and height.';
      }
    }

    // Food intake and calories
    let foodList = [];
    let totalCalories = 0;

    function addCalories() {
      const foodSelect = document.getElementById('foodSelect');
      const quantityInput = document.getElementById('quantity');
      const selectedOption = foodSelect.options[foodSelect.selectedIndex];
      const foodName = selectedOption.text.split(' - ')[0];
      const caloriesPerServing = parseFloat(selectedOption.value);
      const quantity = parseFloat(quantityInput.value);

      if (caloriesPerServing === 0 || isNaN(quantity) || quantity <= 0) {
        alert('Please select a valid food item and enter a valid quantity.');
        return;
      }

      const itemCalories = caloriesPerServing * quantity;

      foodList.push({ foodName, quantity, itemCalories });
      totalCalories += itemCalories;

      updateFoodTable();
      quantityInput.value = '';
      foodSelect.selectedIndex = 0;
    }

    function addCustomCalories() {
      const customCalInput = document.getElementById('customCalories');
      const customCal = parseFloat(customCalInput.value);
      if (isNaN(customCal) || customCal <= 0) {
        alert('Please enter a valid number of calories.');
        return;
      }
      foodList.push({ foodName: 'Custom Calories', quantity: '-', itemCalories: customCal });
      totalCalories += customCal;
      updateFoodTable();
      customCalInput.value = '';
    }

    function updateFoodTable() {
      const tbody = document.querySelector('#foodTable tbody');
      tbody.innerHTML = '';
      foodList.forEach((item, index) => {
        const tr = document.createElement('tr');

        const tdFood = document.createElement('td');
        tdFood.textContent = item.foodName;
        tr.appendChild(tdFood);

        const tdQty = document.createElement('td');
        tdQty.textContent = item.quantity;
        tr.appendChild(tdQty);

        const tdCal = document.createElement('td');
        tdCal.textContent = item.itemCalories.toFixed(2);
        tr.appendChild(tdCal);

        const tdRemove = document.createElement('td');
        const btnRemove = document.createElement('button');
        btnRemove.textContent = 'Remove';
        btnRemove.style.background = '#dc3545';
        btnRemove.style.color = 'white';
        btnRemove.style.border = 'none';
        btnRemove.style.padding = '5px 10px';
        btnRemove.style.borderRadius = '5px';
        btnRemove.style.cursor = 'pointer';
        btnRemove.onclick = () => removeItem(index);
        tdRemove.appendChild(btnRemove);
        tr.appendChild(tdRemove);

        tbody.appendChild(tr);
      });
      document.getElementById('totalCalories').textContent = totalCalories.toFixed(2);
    }

    function removeItem(index) {
      totalCalories -= foodList[index].itemCalories;
      foodList.splice(index, 1);
      updateFoodTable();
    }

    // Water intake tracker
    let totalWater = 0;
    function addWater() {
      const waterInput = document.getElementById('waterIntake');
      const val = parseInt(waterInput.value);
      if (isNaN(val) || val <= 0) {
        alert('Please enter a valid water amount (ml).');
        return;
      }
      totalWater += val;
      document.getElementById('totalWater').textContent = totalWater;
      const progress = document.getElementById('waterProgress');
      progress.value = totalWater > 2000 ? 2000 : totalWater;
      waterInput.value = '';
    }
  </script>

</body>
</html>
